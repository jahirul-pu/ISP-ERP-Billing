services:
  postgres:
    image: postgres:16-alpine
    container_name: isp-erp-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: isp_erp
      POSTGRES_PASSWORD: isp_erp_secret
      POSTGRES_DB: isp_erp
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: isp-erp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
